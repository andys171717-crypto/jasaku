<!DOCTYPE html>

<head>
<meta charset="UTF-8">

<title>Pengerjaan Pesanan</title>

<link rel="stylesheet" href="order-work.css">

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<body>

<div class="header">

<a href="provider-orders.html">
←
</a>

<h1>Pengerjaan Pesanan</h1>

</div>

<div id="orderDetail">

Loading...

</div>

<div class="work-section">

<div class="card">

<h3>Update Progress Pekerjaan</h3>

<p class="progress-desc">
Tekan tombol sesuai kondisi pekerjaan saat ini
</p>

<div class="timeline">

<button
class="step progress-btn"
data-progress="Berangkat">

🚗 Saya Berangkat

</button>

<button
class="step progress-btn"
data-progress="Tiba Lokasi">

📍 Saya Sudah Tiba

</button>

<button
class="step progress-btn"
data-progress="Sedang Dikerjakan">

🔧 Sedang Mengerjakan

</button>

<button
class="step progress-btn"
data-progress="Selesai">

🏁 Pekerjaan Selesai

</button>

</div>

</div>

<div class="card">

<h3>Upload Foto</h3>

<input
type="file"
multiple>

<p class="hint">
Upload foto sebelum,
saat dan sesudah pengerjaan
</p>

</div>

<div class="card">

<h3>Catatan Teknisi</h3>

<textarea
placeholder="Tulis progress pekerjaan...">
</textarea>

</div>

<button class="save-btn">

Simpan Progress

</button>

</div>
