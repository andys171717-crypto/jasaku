<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Akun Saya - JasaKu</title>

<link rel="stylesheet" href="styles.css">

<style>

.profile-header{
background:
linear-gradient(
135deg,
#2563eb,
#6366f1
);

color:white;

padding:24px 20px;

text-align:center;
}

.profile-avatar{
width:100px;
height:100px;
border-radius:50%;
background:white;
color:#1e3a8a;
font-size:40px;
font-weight:bold;
display:flex;
align-items:center;
justify-content:center;
margin:auto;
margin-bottom:15px;
}

.profile-name{
font-size:22px;
font-weight:bold;
}

.profile-phone{
margin-top:8px;
opacity:.9;
}

.auth-btn{
margin-top:15px;
padding:12px 20px;
border:none;
border-radius:10px;
background:white;
color:#1e3a8a;
font-weight:bold;
cursor:pointer;
}

.menu-card{
background:white;
margin:20px;
border-radius:20px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,.08);
}

.menu-item{
display:block;
padding:18px 20px;
text-decoration:none;
color:#0f172a;
border-bottom:1px solid #e5e7eb;
font-weight:500;
}

.menu-item:last-child{
border-bottom:none;
}

.logout{
color:#dc2626;
cursor:pointer;
}

.auth-input{
width:100%;

padding:12px;

margin-top:10px;

border:none;

border-radius:12px;

outline:none;

font-size:14px;

box-sizing:border-box;
}

</style>

</head>
<body>

<div class="profile-header">

<div class="profile-avatar" id="avatar">
G
</div>

<div class="profile-name" id="namaUser">
Guest
</div>

<div class="profile-phone" id="emailUser">
Belum Login
</div>

<div id="authForm">

<input
type="text"
id="nama"
placeholder="Nama Lengkap"
class="auth-input">

<input
type="email"
id="email"
placeholder="Email"
class="auth-input">

<input
type="password"
id="password"
placeholder="Password"
class="auth-input">

<button
id="btnDaftar"
class="auth-btn">
Daftar
</button>

<button
id="btnLoginEmail"
class="auth-btn">
Login
</button>

<hr style="
margin:15px 0;
border:none;
border-top:1px solid rgba(255,255,255,.3);
">

<button
id="btnLogin"
class="auth-btn">
Login Google
</button>

</div>

</div>

<div
class="menu-card"
id="menuCard">

<a href="pesanan.html" class="menu-item">
📋 Pesanan Saya
</a>

<a href="#" class="menu-item">
❤️ Favorit
</a>

<a href="#" class="menu-item">
⚙ Pengaturan
</a>

<a
href="#"
id="btnLogout"
class="menu-item logout">
🚪 Keluar
</a>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.4.0/firebase-app.js";

import {
getAuth,
GoogleAuthProvider,
signInWithPopup,
signOut,
onAuthStateChanged,

createUserWithEmailAndPassword,

signInWithEmailAndPassword,

updateProfile
}

from "https://www.gstatic.com/firebasejs/12.4.0/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyCnk56ZY63q2h1ewEdiivzB0rrSfJOJtYo",
authDomain: "jasaku-92b55.firebaseapp.com",
projectId: "jasaku-92b55",
storageBucket: "jasaku-92b55.firebasestorage.app",
messagingSenderId: "217601622524",
appId: "1:217601622524:web:e3bc48dbdc50d7cb10b279"
};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const provider =
new GoogleAuthProvider();

const btnLogin =
document.getElementById("btnLogin");

const btnDaftar =
document.getElementById("btnDaftar");

const btnLoginEmail =
document.getElementById("btnLoginEmail");

const btnLogout =
document.getElementById("btnLogout");

btnDaftar.addEventListener(
"click",
async ()=>{

const nama =
document.getElementById("nama").value;

const email =
document.getElementById("email").value;

const password =
document.getElementById("password").value;

if(
nama==="" ||
email==="" ||
password===""){
alert("Lengkapi data");
return;
}

try{

const userCredential =
await createUserWithEmailAndPassword(
auth,
email,
password
);

await updateProfile(
userCredential.user,
{
displayName:nama
}
);

alert(
"Akun berhasil dibuat"
);

location.reload();

}catch(err){

alert(err.message);

}

}
);

btnLoginEmail.addEventListener(
"click",
async ()=>{

const email =
document.getElementById("email").value;

const password =
document.getElementById("password").value;

try{

await signInWithEmailAndPassword(
auth,
email,
password
);

}catch(err){

alert(err.message);

}

}
);

btnLogin.addEventListener(
"click",
async ()=>{

try{

await signInWithPopup(
auth,
provider
);

}catch(err){

alert(err.message);

}

}
);

btnLogout.addEventListener(
"click",
async ()=>{

await signOut(auth);

location.reload();

}
);

onAuthStateChanged(
auth,
(user)=>{

if(user){

document.getElementById(
"menuCard"
).style.display =
"block";  

document.getElementById(
"namaUser"
).innerText =
user.displayName;

document.getElementById(
"emailUser"
).innerText =
user.email;

const nama =
user.displayName || "Guest";

const inisial =
nama
.split(" ")
.map(k => k.charAt(0))
.slice(0,2)
.join("")
.toUpperCase();

document.getElementById(
"avatar"
).innerText =
inisial;

document.getElementById(
"authForm"
).style.display =
"none";

}else{

document.getElementById(
"menuCard"
).style.display =
"none";  

document.getElementById(
"namaUser"
).innerText =
"Guest";

document.getElementById(
"emailUser"
).innerText =
"Belum Login";

document.getElementById(
"avatar"
).innerText =
"G";

document.getElementById(
"authForm"
).style.display =
"block";

}

}
);

</script>

</body>
</html>
