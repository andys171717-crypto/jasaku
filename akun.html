<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Akun Saya - JasaKu</title>

<link rel="stylesheet" href="styles.css">

<style>

.profile-header{
background:
linear-gradient(
135deg,
#2563eb,
#6366f1
);

color:white;

padding:24px 20px;

text-align:center;
}

.profile-avatar{
width:100px;
height:100px;
border-radius:50%;
background:white;
color:#1e3a8a;
font-size:40px;
font-weight:bold;
display:flex;
align-items:center;
justify-content:center;
margin:auto;
margin-bottom:15px;
}

.profile-name{
font-size:22px;
font-weight:bold;
}

.profile-phone{
margin-top:8px;
opacity:.9;
}

.auth-btn{
margin-top:15px;
padding:12px 20px;
border:none;
border-radius:10px;
background:white;
color:#1e3a8a;
font-weight:bold;
cursor:pointer;
}

.menu-card{
background:white;
margin:20px;
border-radius:20px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,.08);
}

.menu-item{
display:block;
padding:18px 20px;
text-decoration:none;
color:#0f172a;
border-bottom:1px solid #e5e7eb;
font-weight:500;
}

.menu-item:last-child{
border-bottom:none;
}

.logout{
color:#dc2626;
cursor:pointer;
}

.provider-menu{
background:#eff6ff;
color:#1e40af;
font-weight:700;
} 
  
.mitra-badge{

display:inline-block;

margin-top:12px;

padding:10px 16px;

background:
rgba(255,255,255,.15);

border:1px solid
rgba(255,255,255,.25);

backdrop-filter:blur(10px);

border-radius:14px;

font-size:13px;

font-weight:700;

line-height:1.6;
}
  
</style>

</head>
<body style="display:none;">

<div class="profile-header">

<div class="profile-avatar" id="avatar">
</div>

<div class="profile-name" id="namaUser">
</div>

<div
id="mitraBadge"
style="display:none;">
</div>

<div class="profile-phone" id="emailUser">
</div>

<div id="authForm">

<button
onclick="window.location.href='index.html'"
class="auth-btn">
Masuk / Daftar
</button>

</div>

</div>

<!-- QUICK ACTION -->
<div
class="menu-card"
id="providerSection">
</div>

<!-- MENU UTAMA -->
<div
class="menu-card"
id="menuCard">

<a href="pesanan.html" class="menu-item">
📋 Pesanan Saya
</a>

<a href="#" class="menu-item">
❤️ Favorit
</a>

<a href="#" class="menu-item">
⚙️ Pengaturan
</a>

</div>

<!-- LOGOUT -->
<div class="menu-card">

<a
href="#"
id="btnLogout"
class="menu-item logout">

🚪 Keluar

</a>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.4.0/firebase-app.js";

import {
getAuth,
signOut,
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/12.4.0/firebase-auth.js";

import {
getFirestore,
doc,
getDoc
}
from "https://www.gstatic.com/firebasejs/12.4.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyCnk56ZY63q2h1ewEdiivzB0rrSfJOJtYo",
authDomain: "jasaku-92b55.firebaseapp.com",
projectId: "jasaku-92b55",
storageBucket: "jasaku-92b55.firebasestorage.app",
messagingSenderId: "217601622524",
appId: "1:217601622524:web:e3bc48dbdc50d7cb10b279"
};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getFirestore(app);

const btnLogout =
document.getElementById("btnLogout");

btnLogout.addEventListener(
"click",
async ()=>{

document.body.style.display =
"none";

await signOut(auth);

window.location.href =
"index.html";

}
);

onAuthStateChanged(
auth,
async (user)=>{

document.body.style.display =
"block";

if(user){
  
document.getElementById(
"menuCard"
).style.display =
"block";  
  

document.getElementById(
"namaUser"
).innerText =
user.displayName ||
"Pengguna";

document.getElementById(
"emailUser"
).innerText =
user.email;

const nama =
user.displayName || "Guest";

const inisial =
nama
.split(" ")
.map(k => k.charAt(0))
.slice(0,2)
.join("")
.toUpperCase();

document.getElementById(
"avatar"
).innerText =
inisial;

document.getElementById(
"authForm"
).style.display =
"none";

const userDoc =
await getDoc(
doc(
db,
"users",
user.uid
)
);

const userData =
userDoc.data();

const providerSection =
document.getElementById(
"providerSection"
);

if(
userData &&
userData.role === "provider"
){
  
document.getElementById(
"mitraBadge"
).style.display =
"inline-block";

document.getElementById(
"mitraBadge"
).innerHTML = `

<div class="mitra-badge">

MITRA RESMI JASAKU

<br>

ID JK240001

</div>

`; 

providerSection.innerHTML = `

<a
href="provider-orders.html"
class="menu-item provider-menu">

📥 Pesanan Masuk

</a>

<a
href="my-services.html"
class="menu-item provider-menu">

🛠 Kelola Jasa Saya

</a>

`;

}else{

providerSection.innerHTML = `

<a
href="provider-register.html"
class="menu-item provider-menu">

🛠 Daftar Jadi Provider

</a>

`;

}

}else{
  
document.getElementById(
"menuCard"
).style.display =
"none";  

document.getElementById(
"namaUser"
).innerText =
"Guest";

document.getElementById(
"emailUser"
).innerText =
"Belum Login";

document.getElementById(
"avatar"
).innerText =
"G";

document.getElementById(
"authForm"
).style.display =
"block";

}

}
);

</script>

<nav class="bottom-nav">

<a href="index.html" class="nav-item">
🏠
<small>Beranda</small>
</a>

<a href="#" class="nav-item">
🔍
<small>Cari</small>
</a>

<a href="pesanan.html" class="nav-item">
📋
<small>Pesanan</small>
</a>

<a href="akun.html" class="nav-item">
👤
<small>Akun</small>
</a>

</nav>


</body>
</html>
