<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Akun Saya - JasaKu</title>

<link rel="stylesheet" href="styles.css">

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  
<style>

html,
body{
overflow-x:hidden;
max-width:100%;
}
  
.profile-header{

background:#ffffff;

padding:30px 20px;

text-align:center;

border-bottom:1px solid #eef2ff;

position:relative;

overflow:hidden;

}
  
.profile-header::before{

content:"";

position:absolute;

top:-90px;
right:-90px;

width:220px;
height:220px;

border-radius:50%;

background:
rgba(255,255,255,.08);

filter:blur(20px);

}

.profile-avatar{

width:110px;
height:110px;

border-radius:50%;

background:
linear-gradient(
135deg,
#2563eb,
#4f46e5
);

color:white;

font-size:42px;
font-weight:800;

display:flex;
align-items:center;
justify-content:center;

margin:auto;
margin-bottom:15px;

box-shadow:
0 15px 35px rgba(37,99,235,.25);

}

.profile-name{
font-size:28px;
font-weight:800;
color:#0f172a;
}

.profile-phone{
margin-top:10px;
font-size:14px;
color:#64748b;
}

.auth-btn{
margin-top:15px;
padding:12px 20px;
border:none;
border-radius:10px;
background:white;
color:#1e3a8a;
font-weight:bold;
cursor:pointer;
}

.menu-card{
background:white;

margin:16px 20px;

border-radius:22px;

overflow:hidden;

box-shadow:
0 12px 30px rgba(0,0,0,.08);
}

.menu-item{
display:block;
padding:18px 20px;
text-decoration:none;
color:#0f172a;
border-bottom:1px solid #e5e7eb;
font-weight:500;
}
  
.menu-item i{
width:24px;
margin-right:14px;
}

.fa-receipt{
color:#2563eb;
}

.fa-heart{
color:#ef4444;
}

.fa-gear{
color:#64748b;
}

.fa-right-from-bracket{
color:#dc2626;
} 

.menu-item:last-child{
border-bottom:none;
}

.logout{
color:#dc2626;
cursor:pointer;
}

.provider-menu{
background:#eff6ff;
color:#1e40af;
font-weight:700;
} 
  
.mitra-badge{

display:inline-block;

margin-top:14px;

padding:10px 18px;

background:
linear-gradient(
135deg,
#2563eb,
#4f46e5
);

color:white;

border:none;

border-radius:999px;

font-size:12px;

font-weight:700;

letter-spacing:.5px;
  
box-shadow:
0 10px 25px rgba(37,99,235,.25);

text-transform:uppercase;

}
  
.quick-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
padding:15px;
}

.quick-card{
background:white;
border-radius:18px;
padding:20px 10px;
text-align:center;
text-decoration:none;
color:#0f172a;
box-shadow:0 8px 20px rgba(0,0,0,.08);
font-weight:700;

transition:.2s;
border:1px solid #eef2ff;
}

.quick-icon{
font-size:32px;
display:block;
margin-bottom:12px;
color:#2563eb;
}
  
</style>

</head>
<body style="display:none;padding-bottom:100px;">

<div class="profile-header">

<div class="profile-avatar" id="avatar">
</div>

<div class="profile-name" id="namaUser">
</div>

<div
id="mitraBadge"
style="display:none;">
</div>

<div class="profile-phone" id="emailUser">
</div>

<div id="authForm">

<button
onclick="window.location.href='index.html'"
class="auth-btn">
Masuk / Daftar
</button>

</div>

</div>

<!-- QUICK ACTION -->
<div
class="menu-card"
id="providerSection">
</div>

<!-- MENU UTAMA -->
<div
class="menu-card"
id="menuCard">

<a href="pesanan.html" class="menu-item">
<i class="fa-solid fa-receipt"></i>
Pesanan Saya
</a>

<a href="#" class="menu-item">
<i class="fa-solid fa-heart"></i>
Favorit
</a>

<a href="#" class="menu-item">
<i class="fa-solid fa-gear"></i>
Pengaturan
</a>

</div>

<!-- LOGOUT -->
<div class="menu-card">

<a
href="#"
id="btnLogout"
class="menu-item logout">

<i class="fa-solid fa-right-from-bracket"></i>
Keluar

</a>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.4.0/firebase-app.js";

import {
getAuth,
signOut,
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/12.4.0/firebase-auth.js";

import {
getFirestore,
doc,
getDoc
}
from "https://www.gstatic.com/firebasejs/12.4.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyCnk56ZY63q2h1ewEdiivzB0rrSfJOJtYo",
authDomain: "jasaku-92b55.firebaseapp.com",
projectId: "jasaku-92b55",
storageBucket: "jasaku-92b55.firebasestorage.app",
messagingSenderId: "217601622524",
appId: "1:217601622524:web:e3bc48dbdc50d7cb10b279"
};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getFirestore(app);

const btnLogout =
document.getElementById("btnLogout");

btnLogout.addEventListener(
"click",
async ()=>{

document.body.style.display =
"none";

await signOut(auth);

window.location.href =
"index.html";

}
);

onAuthStateChanged(
auth,
async (user)=>{

document.body.style.display =
"block";

if(user){
  
document.getElementById(
"menuCard"
).style.display =
"block";  
  

document.getElementById(
"namaUser"
).innerText =
user.displayName ||
"Pengguna";

document.getElementById(
"emailUser"
).innerText =
user.email;

const nama =
user.displayName || "Guest";

const inisial =
nama
.split(" ")
.map(k => k.charAt(0))
.slice(0,2)
.join("")
.toUpperCase();

document.getElementById(
"avatar"
).innerText =
inisial;

document.getElementById(
"authForm"
).style.display =
"none";

const userDoc =
await getDoc(
doc(
db,
"users",
user.uid
)
);

const userData =
userDoc.data();

const providerSection =
document.getElementById(
"providerSection"
);

if(
userData &&
userData.role === "provider"
){
  
document.getElementById(
"mitraBadge"
).style.display =
"inline-block";

document.getElementById(
"mitraBadge"
).innerHTML = `

<div class="mitra-badge">

MITRA RESMI JASAKU

<br>

ID JK240001

</div>

`; 

providerSection.innerHTML = `

<div class="quick-grid">

<a
href="provider-orders.html"
class="quick-card">

<span class="quick-icon">
<i class="fa-solid fa-clipboard-check"></i>
</span>

Pesanan Masuk

</a>

<a
href="my-services.html"
class="quick-card">

<span class="quick-icon">
<i class="fa-solid fa-briefcase"></i>
</span>

Kelola Jasa

</a>

</div>

`;

}else{

providerSection.innerHTML = `

<div class="quick-grid">

<a
href="provider-register.html"
class="quick-card">

<span class="quick-icon">
<i class="fa-solid fa-user-plus"></i>
</span>

Gabung Jadi Mitra

</a>

</div>

`;

}

}else{
  
document.getElementById(
"menuCard"
).style.display =
"none";  

document.getElementById(
"namaUser"
).innerText =
"Guest";

document.getElementById(
"emailUser"
).innerText =
"Belum Login";

document.getElementById(
"avatar"
).innerText =
"G";

document.getElementById(
"authForm"
).style.display =
"block";

}

}
);

</script>

</html>
