<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Booking Jasa - JasaKu</title>

<link rel="stylesheet" href="styles.css">

<style>

body{
margin:0;
background:#f5f7fb;
font-family:Arial,sans-serif;
}

.booking-header{
background:#1e3a8a;
color:white;
padding:20px;
text-align:center;
}

.booking-card{
background:white;
margin:20px;
padding:20px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,.08);
}

.form-group{
margin-bottom:15px;
}

.form-group label{
display:block;
margin-bottom:8px;
font-weight:bold;
}

.form-group input,
.form-group textarea{
width:100%;
padding:12px;
border:1px solid #d1d5db;
border-radius:12px;
font-size:14px;
box-sizing:border-box;
}

.form-group textarea{
height:100px;
resize:none;
}

.booking-btn{
width:100%;
background:#2563eb;
color:white;
border:none;
padding:15px;
border-radius:14px;
font-weight:bold;
font-size:16px;
cursor:pointer;
}

</style>

</head>
<body style="display:none;">
  
<div class="booking-header">
<h1>Booking Jasa</h1>
</div>

<div class="booking-card">

<div class="form-group">
<label>Nama Lengkap</label>
<input type="text" id="nama">
</div>

<div class="form-group">
<label>Nomor HP</label>
<input type="tel" id="hp">
</div>

<div class="form-group">
<label>Tanggal Booking</label>
<input type="date" id="tanggal">
</div>

<div class="form-group">
<label>Jam Booking</label>
<input type="time" id="jam">
</div>

<div class="form-group">
<label>Alamat</label>
<textarea id="alamat"></textarea>
</div>

<div class="form-group">
<label>Keluhan</label>
<textarea id="keluhan"></textarea>
</div>

<button
class="booking-btn"
id="btnPesan">
Konfirmasi Pesanan
</button>

</div>
  
<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.4.0/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
doc,
getDoc
}
from "https://www.gstatic.com/firebasejs/12.4.0/firebase-firestore.js";

import {
getAuth,
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/12.4.0/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyCnk56ZY63q2h1ewEdiivzB0rrSfJOJtYo",
authDomain: "jasaku-92b55.firebaseapp.com",
projectId: "jasaku-92b55",
storageBucket: "jasaku-92b55.firebasestorage.app",
messagingSenderId: "217601622524",
appId: "1:217601622524:web:e3bc48dbdc50d7cb10b279",
measurementId: "G-M44C84XF1E"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const params =
new URLSearchParams(
window.location.search
);

const serviceId =
params.get("id");
  
let serviceData = null;
  
async function loadService(){

if(!serviceId) return;

const snap =
await getDoc(
doc(
db,
"services",
serviceId
)
);

if(snap.exists()){

serviceData =
snap.data();

}

}

loadService();

onAuthStateChanged(
auth,
(user)=>{
  
document.body.style.display =
"block"; 

if(!user){

window.location.href =
"index.html";

}

}
);

document
.getElementById("btnPesan")
.addEventListener("click", simpanPesanan);

async function simpanPesanan(){

const nama =
document.getElementById("nama").value;

const hp =
document.getElementById("hp").value;

const tanggal =
document.getElementById("tanggal").value;

const jam =
document.getElementById("jam").value;

const alamat =
document.getElementById("alamat").value;

const keluhan =
document.getElementById("keluhan").value;

if(
nama.trim() === "" ||
hp.trim() === "" ||
tanggal.trim() === "" ||
jam.trim() === "" ||
alamat.trim() === ""
){
alert("Semua data wajib diisi");
return;
}

try{

await addDoc(
collection(db,"orders"),
{

userId:
auth.currentUser.uid,

providerId:
serviceData.userId,

serviceId,

namaJasa:
serviceData.namaJasa,

harga:
serviceData.harga,

nama,
hp,
tanggal,
jam,
alamat,
keluhan,

status:
"Menunggu",

createdAt:
Date.now()

}
);

alert(
"Pesanan berhasil dibuat"
);

window.location.href =
"pesanan.html";

}catch(error){

alert(error.message);

}

}

</script>

</body>
</html>
