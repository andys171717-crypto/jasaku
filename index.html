<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JasaKu</title>

  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header>
    <h1>JasaKu</h1>
    <p>Cari Jasa Terpercaya di Sekitarmu</p>
  </header>

  <section class="search-box">
    <input type="text" placeholder="Cari jasa...">
    <button>Cari</button>
  </section>

  <h2 class="section-title">
  Kategori Populer
</h2>

  <section class="kategori">

    <div class="card">
      🔧
      <span>Service AC</span>
    </div>

    <div class="card">
      ⚡
      <span>Listrik</span>
    </div>

    <div class="card">
      💻
      <span>Komputer</span>
    </div>

    <div class="card">
      📹
      <span>CCTV</span>
    </div>

  </section>

<section class="provider-section">

  <h2 class="section-title">
    Penyedia Jasa Terdekat
  </h2>

  <div class="provider-card">

    <div class="provider-info">
      <h3>Ahmad Service AC</h3>
      <p>⭐ 4.9</p>
      <p>Mulai Rp100.000</p>
    </div>

    <button class="btn-pesan">
      Pesan
    </button>

  </div>

  <div class="provider-card">

    <div class="provider-info">
      <h3>Budi Listrik</h3>
      <p>⭐ 4.8</p>
      <p>Mulai Rp80.000</p>
    </div>

    <button class="btn-pesan">
      Pesan
    </button>

  </div>

</section>


</body>
</html>
