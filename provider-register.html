<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Profil Mitra
</title>

<link
rel="stylesheet"
href="provider-register.css">

</head>

<body>

<div class="provider-container">

<div class="provider-card">

<div id="viewMode">

<div class="provider-profile">

<div class="provider-avatar"
id="providerAvatar">

🏢

</div>

<h2 id="viewBusinessName">
Nama Usaha
</h2>

<div class="provider-badge">
Provider JasaKu
</div>

<div class="provider-info">

<p>
📞
<span id="viewPhone"></span>
</p>

<p>
📍
<span id="viewLocation"></span>
</p>

</div>

<div class="provider-about">

<h3>Tentang Usaha</h3>

<p id="viewDescription">
-
</p>

</div>

<button
class="provider-btn"
id="btnEditProfile">

Edit Profil

</button>

</div>

</div>  

<div id="editMode" style="display:none;">
  
<a href="akun.html" class="back-link">
← Kembali
</a>

<div
class="provider-title"
id="pageTitle">

Lengkapi Profil Mitra

</div>

<input
class="provider-input"
id="businessName"
placeholder="Nama Usaha">

<input
class="provider-input"
id="phone"
placeholder="Nomor HP">

<input
class="provider-input"
id="province"
placeholder="Provinsi">

<input
class="provider-input"
id="city"
placeholder="Kota">

<input
class="provider-input"
id="district"
placeholder="Kecamatan">

<textarea
class="provider-textarea"
id="address"
placeholder="Alamat Lengkap">
</textarea>

<textarea
class="provider-textarea"
id="description"
placeholder="Deskripsi Usaha">
</textarea>

<button
class="provider-btn"
id="btnSaveProvider">

Simpan Data

</button>

</div>

</div>

</div>

<script
type="module"
src="provider-register.js">
</script>

</body>
</html>
