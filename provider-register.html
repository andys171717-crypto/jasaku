<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Profil Mitra
</title>

<link
rel="stylesheet"
href="provider-register.css">

</head>

<body>

<div class="provider-container">

<div class="provider-card">
  
<a href="akun.html" class="back-link">
← Kembali
</a>

<div class="provider-title">
Lengkapi Profil Mitra
</div>

<input
class="provider-input"
id="businessName"
placeholder="Nama Usaha">

<input
class="provider-input"
id="phone"
placeholder="Nomor HP">

<input
class="provider-input"
id="province"
placeholder="Provinsi">

<input
class="provider-input"
id="city"
placeholder="Kota">

<input
class="provider-input"
id="district"
placeholder="Kecamatan">

<textarea
class="provider-textarea"
id="address"
placeholder="Alamat Lengkap">
</textarea>

<textarea
class="provider-textarea"
id="description"
placeholder="Deskripsi Usaha">

<button
class="provider-btn"
