<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tambah Jasa V2</title>
  
<link rel="stylesheet" href="styles.css">

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>
<body style="display:none;">

<div class="service-page">

<div class="service-header">

<h1>Tambah Layanan</h1>

<p>
Kelola layanan yang akan
ditampilkan di JasaKu
</p>

</div>

<div class="service-card">

<label>Nama Layanan</label>

<input id="namaJasa"
placeholder="Contoh: Service AC">

<label>Kategori</label>

<select id="kategori">

<option value="">
Pilih Kategori
</option>

<option value="AC">
AC
</option>

<option value="Listrik">
Listrik
</option>

<option value="Laptop">
Laptop
</option>

<option value="CCTV">
CCTV
</option>

<option value="Lainnya">
Lainnya
</option>

</select>

<input
id="subKategori"
placeholder="Jenis Jasa"
style="display:none;">

<label>Harga</label>

<input id="harga" placeholder="Contoh: 150000">

<label>Kota</label>

<input id="kota" placeholder="Contoh: Medan">

<label>Deskripsi</label>

<textarea
id="deskripsi"
placeholder="Jelaskan layanan Anda">
</textarea>

<button id="btnSimpan">
Simpan Layanan
</button>

</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.4.0/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
doc,
getDoc
}
from "https://www.gstatic.com/firebasejs/12.4.0/firebase-firestore.js";

import {
getAuth,
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/12.4.0/firebase-auth.js";
  
const firebaseConfig = {
apiKey: "AIzaSyCnk56ZY63q2h1ewEdiivzB0rrSfJOJtYo",
authDomain: "jasaku-92b55.firebaseapp.com",
projectId: "jasaku-92b55",
storageBucket: "jasaku-92b55.firebasestorage.app",
messagingSenderId: "217601622524",
appId: "1:217601622524:web:e3bc48dbdc50d7cb10b279"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
  
onAuthStateChanged(
auth,
async(user)=>{

if(!user){

window.location.href =
"index.html";

return;

}

const userSnap =
await getDoc(
doc(
db,
"users",
user.uid
)
);

if(
!userSnap.exists() ||
!userSnap.data()
.providerProfileComplete
){

alert(
"Lengkapi profil mitra terlebih dahulu"
);

window.location.href =
"provider-register.html";

return;

}

document.body.style.display =
"block";

}
);

document
.getElementById("kategori")
.addEventListener(
"change",
function(){

const subKategori =
document.getElementById(
"subKategori"
);

if(
this.value ===
"Lainnya"
){

subKategori.style.display =
"block";

}else{

subKategori.style.display =
"none";

subKategori.value = "";

}

}
);

document
.getElementById("btnSimpan")
.addEventListener("click", simpanJasa);

async function simpanJasa(){

const namaJasa =
document.getElementById("namaJasa").value;

const kategori =
document.getElementById("kategori").value;

const subKategori =
document.getElementById(
"subKategori"
).value;

const harga =
document.getElementById("harga").value;

const kota =
document.getElementById("kota").value;

const deskripsi =
document.getElementById("deskripsi").value;

if(
kategori==="Lainnya" &&
subKategori.trim()===""
){

alert(
"Jenis jasa wajib diisi"
);

return;

}

if(
namaJasa.trim()==="" ||
kategori.trim()==="" ||
harga.trim()==="" ||
kota.trim()==="" ||
deskripsi.trim()===""
){

alert(
"Semua data wajib diisi"
);

return;

}
  
try{

await addDoc(
collection(db,"services"),
{

userId:
auth.currentUser.uid,

namaJasa,
kategori,
harga,
kota,
deskripsi,

status:
"aktif",

subKategori:
subKategori || "",

createdAt:
Date.now()

}
);

alert(
"Jasa berhasil ditambahkan"
);
  
window.location.href =
"index.html";

}catch(error){

alert(
error.message
);

}

}

</script>

<nav class="bottom-nav">

<a href="index.html" class="nav-item">

<i class="fas fa-house"></i>

<small>Beranda</small>

</a>

<a href="index.html" class="nav-item">

<i class="fas fa-magnifying-glass"></i>

<small>Cari</small>

</a>

<a href="pesanan.html" class="nav-item">

<i class="fas fa-clipboard-list"></i>

<small>Pesanan</small>

</a>

<a href="akun.html" class="nav-item active">

<i class="fas fa-user"></i>

<small>Akun</small>

</a>

</nav>


</body>
</html>
