<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pesanan Masuk</title>

<link rel="stylesheet" href="styles.css">

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

body{
background:#f5f6fa;
font-family:Arial,sans-serif;
margin:0;
}

.header{
background:linear-gradient(
135deg,
#1e3a8a,
#2563eb
);
color:white;
padding:20px;
display:flex;
align-items:center;
gap:15px;
}

.header h1{
margin:0;
font-size:20px;
}

.header p{
margin:4px 0 0;
font-size:13px;
opacity:.9;
}

.back-btn{
color:white;
text-decoration:none;
font-size:24px;
font-weight:bold;
}

.order-card{
background:white;
margin:20px;
padding:20px;
border-radius:24px;
box-shadow:
0 10px 30px rgba(0,0,0,.08);
}

.status{
display:inline-block;
padding:8px 14px;
border-radius:20px;
background:#fef3c7;
color:#92400e;
font-weight:bold;
margin-top:10px;
}

.order-info{
margin-top:15px;
line-height:1.8;
}

.action-buttons{
display:flex;
gap:10px;
margin-top:15px;
}

.btn-accept,
.btn-finish,
.btn-reject{
flex:1;
border:none;
padding:12px;
border-radius:12px;
font-weight:bold;
cursor:pointer;
}

.btn-accept{
background:#16a34a;
color:white;
}

.btn-reject{
background:#dc2626;
color:white;
}

.btn-finish{
background:#2563eb;
color:white;
}

.bottom-nav{
position:fixed;
bottom:0;
left:0;
right:0;
background:white;
display:flex;
justify-content:space-around;
padding:12px 0;
box-shadow:0 -4px 20px rgba(0,0,0,.08);
border-radius:24px 24px 0 0;
}

.nav-item{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-decoration:none;
color:#64748b;
font-size:11px;
gap:3px;
text-align:center;
}

.nav-item i{
font-size:20px;
}

.nav-item.active{
color:#2563eb;
font-weight:bold;
}

body{
padding-bottom:90px;
}

</style>

</head>

<body>

<div class="header">

<a href="akun.html"
class="back-btn">
←
</a>

<div>

<h1>Pesanan Masuk</h1>

<p>
Kelola pesanan pelanggan
</p>

</div>

</div>

<div id="ordersList"></div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.4.0/firebase-app.js";

import {
getFirestore,
collection,
query,
where,
getDocs,
doc,
updateDoc
}
from "https://www.gstatic.com/firebasejs/12.4.0/firebase-firestore.js";

import {
getAuth,
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/12.4.0/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyCnk56ZY63q2h1ewEdiivzB0rrSfJOJtYo",
authDomain: "jasaku-92b55.firebaseapp.com",
projectId: "jasaku-92b55",
storageBucket: "jasaku-92b55.firebasestorage.app",
messagingSenderId: "217601622524",
appId: "1:217601622524:web:e3bc48dbdc50d7cb10b279"
};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const auth = getAuth(app);

async function loadOrders(uid){

const container =
document.getElementById(
"ordersList"
);

container.innerHTML = "";

const q =
query(
collection(db,"orders"),
where(
"providerId",
"==",
uid
)
);

const snapshot =
await getDocs(q);

if(snapshot.empty){

container.innerHTML = `

<div class="order-card">

<h3>
Belum Ada Pesanan Masuk
</h3>

</div>

`;

return;

}

snapshot.forEach(order=>{

const data =
order.data();

container.innerHTML += `

<div class="order-card">

<h3>
${data.namaJasa}
</h3>

<div class="status">
${data.status}
</div>

<div class="order-info">

<p>
<b>Nama:</b>
${data.nama}
</p>

<p>
<b>HP:</b>
${data.hp}
</p>

<p>
<b>Alamat:</b>
${data.alamat}
</p>

<p>
<b>Keluhan:</b>
${data.keluhan}
</p>

</div>

${
data.status==="Menunggu"
?
`
<div class="action-buttons">

<button
class="btn-accept"
data-id="${order.id}">
Terima
</button>

<button
class="btn-reject"
data-id="${order.id}">
Tolak
</button>

</div>
`
:
data.status==="Diterima"
?
`
<div class="action-buttons">

<button
class="btn-start"
data-id="${order.id}">
Mulai Pengerjaan
</button>

</div>
`
:
data.status==="Sedang Dikerjakan"
?
`
<div class="action-buttons">

<button
class="btn-work"
data-id="${order.id}">
Kelola Pekerjaan
</button>

</div>
`
:
""
}

</div>

`;

});

}

onAuthStateChanged(
auth,
(user)=>{

if(!user){

window.location.href =
"index.html";

return;

}

console.log("UID LOGIN:", user.uid);

loadOrders(user.uid);

}
);

document.addEventListener(
"click",
async(e)=>{

if(
e.target.classList.contains(
"btn-accept"
)
){

if(
e.target.classList.contains(
"btn-finish"
)
){

await updateDoc(
doc(
db,
"orders",
e.target.dataset.id
),
{
status:"Selesai"
}
);

location.reload();

}    

await updateDoc(
doc(
db,
"orders",
e.target.dataset.id
),
{
status:"Diterima"
}
);

location.reload();

}

if(
e.target.classList.contains(
"btn-start"
)
){

await updateDoc(
doc(
db,
"orders",
e.target.dataset.id
),
{
status:"Sedang Dikerjakan"
}
);

location.reload();

}

if(
e.target.classList.contains(
"btn-work"
)
){

window.location.href =
`order-work.html?id=${e.target.dataset.id}`;

} 
  
if(
e.target.classList.contains(
"btn-reject"
)
){

await updateDoc(
doc(
db,
"orders",
e.target.dataset.id
),
{
status:"Ditolak"
}
);

location.reload();

}

}
);

</script>

<nav class="bottom-nav">

<a href="index.html" class="nav-item">
<i class="fa-solid fa-house"></i>
<small>Beranda</small>
</a>

<a href="#" class="nav-item">
<i class="fa-solid fa-magnifying-glass"></i>
<small>Cari</small>
</a>

<a href="provider-orders.html" class="nav-item active">
<i class="fa-solid fa-inbox"></i>
<small>Pesanan Masuk</small>
</a>

<a href="akun.html" class="nav-item">
<i class="fa-solid fa-user"></i>
<small>Akun</small>
</a>

</nav>


</body>
</html>
